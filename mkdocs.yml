site_name: LLM Wiki
site_description: Personal LLM knowledge base — trilingual (zh/en/ja)
docs_dir: wiki
repo_url: https://github.com/wangsiyu12344/my-llm-wiki
edit_uri: edit/master/wiki/

theme:
  name: material
  language: zh
  features:
    - navigation.tabs
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - roamlinks
  - search:
      lang: [zh, en, ja]

markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences
  - admonition
  - footnotes

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/wangsiyu12344/my-llm-wiki
